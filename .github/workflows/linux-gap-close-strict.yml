name: Linux Gap Close Strict

on:
  workflow_dispatch:

jobs:
  gap-close-strict:
    runs-on:
      - self-hosted
      - linux
      - x64
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare Linux perf
        shell: bash
        run: |
          set -euxo pipefail

          sudo sysctl -w kernel.perf_event_paranoid=-1 || true
          sudo sysctl -w kernel.kptr_restrict=0 || true

          KERNEL_REL="$(uname -r)"
          KERNEL_FLAVOR="${KERNEL_REL##*-}"
          KERNEL_ABI="${KERNEL_REL%-${KERNEL_FLAVOR}}"
          KERNEL_ABI="${KERNEL_ABI%-}"
          KERNEL_SERIES="${KERNEL_ABI%%.0-*}"

          if command -v perf >/dev/null 2>&1 && perf --version >/dev/null 2>&1; then
            perf --version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y linux-tools-common || true
          sudo apt-get install -y "linux-tools-$KERNEL_REL" || true
          sudo apt-get install -y "linux-cloud-tools-$KERNEL_REL" || true
          sudo apt-get install -y "linux-$KERNEL_FLAVOR-$KERNEL_SERIES-tools-$KERNEL_ABI" || true
          sudo apt-get install -y "linux-$KERNEL_FLAVOR-$KERNEL_SERIES-cloud-tools-$KERNEL_ABI" || true

          PERF_BIN=""
          if [ -x "/usr/lib/linux-tools-$KERNEL_REL/perf" ]; then
            PERF_BIN="/usr/lib/linux-tools-$KERNEL_REL/perf"
          elif [ -x "/usr/lib/linux-tools/$KERNEL_REL/perf" ]; then
            PERF_BIN="/usr/lib/linux-tools/$KERNEL_REL/perf"
          elif [ -x "/usr/lib/linux-$KERNEL_FLAVOR-$KERNEL_SERIES-tools-$KERNEL_ABI/perf" ]; then
            PERF_BIN="/usr/lib/linux-$KERNEL_FLAVOR-$KERNEL_SERIES-tools-$KERNEL_ABI/perf"
          else
            PERF_BIN="$(find /usr/lib -type f \( -path '/usr/lib/linux-tools-*/perf' -o -path '/usr/lib/linux-tools/*/perf' -o -path '/usr/lib/linux-*-tools-*/perf' \) 2>/dev/null | sort | grep "/$KERNEL_REL/perf\\|linux-tools-$KERNEL_REL/perf\\|linux-$KERNEL_FLAVOR-$KERNEL_SERIES-tools-$KERNEL_ABI/perf" | tail -n 1 || true)"
          fi
          if [ -z "$PERF_BIN" ]; then
            PERF_BIN="$(find /usr/lib -type f \( -path '/usr/lib/linux-tools-*/perf' -o -path '/usr/lib/linux-tools/*/perf' -o -path '/usr/lib/linux-*-tools-*/perf' \) 2>/dev/null | sort | tail -n 1 || true)"
          fi
          if [ -n "$PERF_BIN" ]; then
            sudo ln -sf "$PERF_BIN" /usr/local/bin/perf
          fi

          command -v perf
          ls -l "$(command -v perf)"
          perf --version

      - name: Setup Python venv
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install matplotlib

      - name: Install DMD nightly
        shell: bash
        run: |
          set -euxo pipefail
          curl -fsSL https://dlang.org/install.sh | bash -s -- -p ./.locald install dmd-nightly
          ./.locald/dmd-nightly/linux/bin64/dmd --version

      - name: Checkout DMD source for parser prototype
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --recurse-submodules https://github.com/dlang/dmd external/dmd
          git -C external/dmd apply "$GITHUB_WORKSPACE/patches/external_dmd_parser_parallel_prototype.patch"

      - name: Build parser prototype DMD
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x build_parser_threaded_dmd.sh
          THREADED_DMD="$(./build_parser_threaded_dmd.sh --host-dmd ./.locald/dmd-nightly/linux/bin64/dmd --build-mode debug)"
          echo "THREADED_DMD=$THREADED_DMD" >> "$GITHUB_ENV"
          "$THREADED_DMD" --version

      - name: Run strict Linux gap close gates
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x linux_gap_close.sh
          ./linux_gap_close.sh \
            --python-bin ./.venv/bin/python \
            --gate-b-mode strict \
            --profile-dmd-bin ./.locald/dmd-nightly/linux/bin64/dmd \
            --parser-dmd-bin "$THREADED_DMD"

      - name: Run Linux parser comparison
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          if [[ -z "${THREADED_DMD:-}" || ! -x "${THREADED_DMD:-}" ]]; then
            echo "THREADED_DMD missing or not executable; skipping parser comparison because prototype build did not complete cleanly."
            exit 0
          fi
          chmod +x parser_threading_compare.sh
          ./parser_threading_compare.sh \
            --python-bin ./.venv/bin/python \
            --baseline-dmd ./.locald/dmd-nightly/linux/bin64/dmd \
            --threaded-dmd "$THREADED_DMD" \
            --threads 1,2,4 \
            --repeats 3 \
            --file-count 64 \
            --out-dir artifacts/linux_gap_close/parser_thread_compare_linux

      - name: Upload strict Linux gap-close artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gap-close-strict-artifacts
          path: artifacts/linux_gap_close/
